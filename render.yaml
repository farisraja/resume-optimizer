services:
  - type: web
    name: resume-optimizer
    env: docker
    region: singapore
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-optimizer-db
          property: connectionString
      - key: RUN_MIGRATIONS
        value: true
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: PROD

databases:
  - name: resume-optimizer-db
    region: singapore
    plan: free
